<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Web Media Parser</h1>
    <div id="status" class="status offline">Disconnected</div>
  </div>

  <div id="scan-section">
    <button id="scan-btn" class="primary full-width">Scan This Page</button>
    <div id="page-info" class="hidden"></div>
  </div>

  <div id="results" class="hidden">
    <div class="results-header">
      <span id="count">0 items</span>
      <div class="results-controls">
        <select id="domain-filter" class="domain-filter">
          <option value="">All domains</option>
        </select>
        <select id="source-filter" class="domain-filter">
          <option value="">All sources</option>
          <option value="fullsize">Full size</option>
          <option value="thumbnail">Thumbnails</option>
        </select>
        <label><input type="checkbox" id="select-all" checked> All</label>
      </div>
    </div>

    <div id="media-list"></div>

    <div class="actions">
      <label><input type="checkbox" id="one-shot" checked> Page only</label>
      <div class="actions-buttons">
        <button id="chrome-download-btn" class="secondary" disabled>
          Save (Chrome) <span id="chrome-count">0</span>
        </button>
        <button id="download-btn" class="primary" disabled>
          Download <span id="selected-count">0</span>
        </button>
      </div>
    </div>
  </div>

  <div id="empty" class="hidden">
    <p>No media found on this page.</p>
  </div>

  <div class="footer">
    <div id="sieve-info" class="sieve-info"></div>
    <label class="sieve-upload">
      <input type="file" id="sieve-file" accept=".json" style="display:none">
      <span id="sieve-btn" class="sieve-link">Load sieve rules...</span>
    </label>
  </div>

  <div id="error" class="hidden error"></div>

  <script src="popup.js"></script>
</body>
</html>
